name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Linux correctness tests
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gfortran python3

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DMAI_ENABLE_DOCKER_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run non-Docker correctness tests
        run: ctest --test-dir build --output-on-failure -LE docker

      - name: Run Docker correctness tests
        run: ctest --test-dir build --output-on-failure -L docker
